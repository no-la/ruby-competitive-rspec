plugins:
  - rubocop-rspec

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  SuggestExtensions: false
  Exclude:
    - "vendor/**/*"

Layout/LineLength:
  Max: 120

# Algorithm snippets are intentionally compact and can be structurally complex.
Metrics/AbcSize:
  Enabled: false
Metrics/ClassLength:
  Enabled: false
Metrics/MethodLength:
  Enabled: false

RSpec/ExampleLength:
  Enabled: false
